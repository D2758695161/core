id: config-validation
title: Config File Validation at Startup
description: >
  Add config validation to src/config/bootstrap.ts. Currently the bootstrap
  module hardcodes the relay pubkey and src/wallet/index.ts writes config.json
  without validation on read. Add a validateConfig function that checks all
  required fields, types, and format (e.g. pubkey is valid base64 of correct
  length). Call it during init, provide start, and relay start. On invalid
  config, throw with a clear message naming every bad field at once.
module: core
files_to_create:
  - src/config/validator.ts
files_to_modify:
  - src/config/bootstrap.ts
tests:
  - tests/config.test.ts
acceptance:
  - validateConfig returns a list of all validation errors (not just the first)
  - Missing required fields produce error messages naming the field
  - Wrong types (e.g. string where number expected) produce clear errors
  - Invalid pubkey format is detected and reported
  - Valid config passes without errors
  - tests/config.test.ts exists and passes
points: 400
difficulty: medium
status: open
