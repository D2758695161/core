id: provider-metrics
title: Provider Performance Metrics Endpoint
description: >
  Add in-memory metrics tracking to the provider in src/provider/index.ts.
  Track total requests, per-model request counts, p50/p95/p99 latency from
  a rolling window of the last 1000 requests, and error rate. Expose via
  GET /metrics returning JSON. No external dependencies. Data resets on
  provider restart.
module: provider
files_to_create:
  - src/provider/metrics.ts
files_to_modify:
  - src/provider/index.ts
tests:
  - tests/provider.test.ts
acceptance:
  - GET /metrics returns JSON with totalRequests, perModel, latency (p50/p95/p99), errorRate
  - Latency percentiles are computed from the last 1000 requests (rolling window)
  - perModel breaks down request count and latency by model name
  - Metrics update correctly after each request
  - No external dependencies added
  - tests/provider.test.ts includes metrics tests and passes
points: 500
difficulty: medium
status: open
