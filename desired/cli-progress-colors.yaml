id: cli-progress-colors
title: CLI Progress Indicators and Color Output
description: >
  Improve src/cli.ts output with colored status indicators, a spinner during
  wallet generation and connection, and table formatting for the status command.
  Use Node 22 built-in util.styleText or a single dependency under 50KB.
  Degrade gracefully when NO_COLOR env is set or stdout is not a TTY.
module: cli
files_to_modify:
  - src/cli.ts
tests:
  - tests/cli.test.ts
acceptance:
  - Wallet generation shows a spinner that clears on completion
  - Status indicators use color (green=ok, yellow=warn, red=error)
  - veil status output uses aligned table formatting
  - NO_COLOR=1 disables all color and animation
  - Non-TTY stdout outputs plain text without ANSI codes
  - tests/cli.test.ts exists and passes
points: 400
difficulty: medium
status: open
