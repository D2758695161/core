id: relay-rate-limiting
title: Relay Rate Limiting per Consumer
description: >
  Add sliding window rate limiting to the relay in src/relay/index.ts.
  Track request counts per consumer signing pubkey (not per IP) using an
  in-memory Map. Default limit: 60 requests per 60-second window. Configurable
  via VEIL_RELAY_RATE_LIMIT env var. Return HTTP 429 with Retry-After header
  when a consumer exceeds the limit.
module: relay
files_to_modify:
  - src/relay/index.ts
tests:
  - tests/relay.test.ts
acceptance:
  - Requests under limit return normal responses
  - Request exceeding limit returns 429 with Retry-After header
  - Rate tracking is per consumer pubkey, not per IP address
  - Sliding window resets correctly after the window period
  - VEIL_RELAY_RATE_LIMIT env var overrides the default 60 req/min
  - tests/relay.test.ts includes rate limit tests and passes
points: 400
difficulty: medium
status: open
