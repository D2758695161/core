id: consumer-retry-logic
title: Consumer Retry with Exponential Backoff
description: >
  Add retry logic to the consumer request path in src/consumer/index.ts.
  On provider 5xx errors, retry up to 3 times with exponential backoff
  (1s, 2s, 4s). If ProviderSelector is available, retry on a different
  provider. Do not retry on 4xx errors or when streaming has already started
  delivering chunks.
module: consumer
files_to_modify:
  - src/consumer/index.ts
tests:
  - tests/consumer.test.ts
acceptance:
  - 5xx errors trigger up to 3 retries
  - Backoff delays are 1s, 2s, 4s (exponential)
  - 4xx errors are not retried, returned immediately
  - No retry once SSE streaming chunks have been delivered to the caller
  - If ProviderSelector exists, retry uses a different provider
  - tests/consumer.test.ts includes retry tests and passes
points: 400
difficulty: medium
status: open
